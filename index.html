<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A区运营月累计排行 | 6.1-6.14</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f5f0e8;padding:20px;color:#2d2d2d}
.header{text-align:center;padding:30px 20px;background:#fff;border:4px solid #2d2d2d;box-shadow:8px 8px 0 #2d2d2d;margin-bottom:30px}
.header h1{font-size:2rem;font-weight:900;letter-spacing:-1px}
.header .date{font-size:1rem;color:#666;margin-top:8px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:30px}
.card{background:#fff;border:3px solid #2d2d2d;box-shadow:5px 5px 0 #2d2d2d;padding:20px;text-align:center}
.card .num{font-size:2rem;font-weight:900;margin-top:6px}
.card .label{font-size:.8rem;color:#888;font-weight:600}
.section{margin-bottom:40px}
.section-title{font-size:1.3rem;font-weight:900;padding:10px 24px;display:inline-block;margin-bottom:16px;color:#fff}
.rank-table{width:100%;background:#fff;border:3px solid #2d2d2d;box-shadow:5px 5px 0 #2d2d2d;border-collapse:collapse}
.rank-table th{padding:12px 10px;font-size:.85rem;text-align:center;color:#fff}
.rank-table td{padding:12px 10px;text-align:center;border-bottom:2px solid #f0f0f0;font-weight:600}
.rank-table tr:last-child td{border-bottom:none}
.medal{font-size:1.3rem}
.rank-1{background:#fffbe6} .rank-2{background:#f8f8f8} .rank-3{background:#fff5e6}
.chart-wrap{background:#fff;border:3px solid #2d2d2d;box-shadow:5px 5px 0 #2d2d2d;padding:20px;margin-top:20px}
.footer{text-align:center;padding:20px;color:#aaa;font-size:.8rem}
</style>
</head>
<body>

<div class="header">
  <h1>A区运营月累计排行</h1>
  <div class="date">2026.6.1 — 6.14</div>
</div>

<div class="cards">
  <div class="card"><div class="label">总播放量（万）</div><div class="num">68.4</div></div>
  <div class="card"><div class="label">总发布条数</div><div class="num">6576</div></div>
  <div class="card"><div class="label">上5K总条数</div><div class="num">55</div></div>
  <div class="card"><div class="label">上5K美国平均占比</div><div class="num">69.2%</div></div>
  <div class="card"><div class="label">参与运营</div><div class="num">4</div></div>
</div>

<div id="root"></div>

<script>
const DATA = {"数字人": [{"运营名字": "庄惜婷", "播放量": 16.2, "发布条数": 500.0, "上5K条数": 6, "美国占比": 0.01, "上5K占比": 1.2}, {"运营名字": "王春燕", "播放量": 6.1, "发布条数": 920.0, "上5K条数": 3, "美国占比": 0.0, "上5K占比": 0.3}], "测评图文": [{"运营名字": "吴丽贞", "播放量": 34.8, "发布条数": 2091.0, "上5K条数": 31, "美国占比": 0.02, "上5K占比": 1.5}, {"运营名字": "蔡晓雪", "播放量": 8.6, "发布条数": 1934.0, "上5K条数": 11, "美国占比": 0.0, "上5K占比": 0.6}, {"运营名字": "庄惜婷", "播放量": 2.7, "发布条数": 1127.0, "上5K条数": 4, "美国占比": 0.0, "上5K占比": 0.4}]};
const COLORS = {'数字人':{accent:'#f59e0b'},'测评图文':{accent:'#06b6d4'}};
const MEDALS = ['🥇','🥈','🥉'];

function render(p) {
  const d = DATA[p];
  if (!d||!d.length) return '<div class="section"><p style="padding:20px;background:#fff;border:3px solid #2d2d2d">暂无数据</p></div>';
  const a = COLORS[p].accent;
  let rows = '';
  d.forEach((r,i) => {
    const m = i<3 ? MEDALS[i] : '#'+(i+1);
    const c = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
    const us = r['美国占比'] ? (r['美国占比']*100).toFixed(1) : '0.0';
    const pct = r['上5K占比']!=null&&!isNaN(r['上5K占比']) ? r['上5K占比'].toFixed(1) : '0.0';
    rows += '<tr class="'+c+'"><td><span class="medal">'+m+'</span></td><td>'+r['运营名字']+'</td><td>'+r['播放量']+'</td><td>'+r['发布条数']+'</td><td>'+r['上5K条数']+'</td><td>'+pct+'%</td><td>'+us+'%</td></tr>';
  });
  return '<div class="section"><div class="section-title" style="background:'+a+'">'+p+'</div><table class="rank-table"><thead><tr style="background:'+a+'"><th>排名</th><th>运营</th><th>播放量(万)</th><th>发布条数</th><th>上5K条数</th><th>上5K占比</th><th>美国占比</th></tr></thead><tbody>'+rows+'</tbody></table><div class="chart-wrap"><canvas id="c-'+p+'" height="200"></canvas></div></div>';
}

document.getElementById('root').innerHTML = render('数字人')+render('测评图文');

Object.keys(COLORS).forEach(p => {
  const d = DATA[p];
  if(!d||!d.length)return;
  const a = COLORS[p].accent;
  new Chart(document.getElementById('c-'+p),{
    type:'bar',
    data:{labels:d.map(r=>r['运营名字']),datasets:[
      {label:'播放量(万)',data:d.map(r=>r['播放量']),backgroundColor:a+'cc',borderColor:a,borderWidth:2,borderRadius:4},
      {label:'上5K条数',data:d.map(r=>r['上5K条数']),backgroundColor:'#2d2d2d88',borderColor:'#2d2d2d',borderWidth:2,borderRadius:4}
    ]},
    options:{responsive:true,plugins:{legend:{position:'top'}},scales:{y:{beginAtZero:true,grid:{color:'#eee'}}}}
  });
});
</script>
<div class="footer">数据来源：A区运营表 6.1-6.14 · 自动生成</div>
</body>
</html>
