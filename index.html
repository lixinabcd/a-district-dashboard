<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A区 6.1-6.14 运营看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background:#f0f2f5; padding:32px 24px; }
.container { max-width:1200px; margin:0 auto; }
h1 { font-size:26px; font-weight:700; margin-bottom:4px; }
.subtitle { color:#888; font-size:14px; margin-bottom:32px; }
.section { background:#fff; border-radius:16px; padding:28px 32px; box-shadow:0 2px 12px rgba(0,0,0,0.06); margin-bottom:24px; }
.section-title { font-size:20px; font-weight:700; padding-bottom:12px; margin-bottom:24px; border-bottom:2px solid #e8e8e8; }
.card-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:28px; }
@media (max-width:700px) { .card-grid { grid-template-columns:repeat(3,1fr); } }
@media (max-width:480px) { .card-grid { grid-template-columns:repeat(2,1fr); } }
.card { padding:18px; border-radius:12px; border:1px solid #e8e8e8; }
.card-label { font-size:13px; color:#888; font-weight:500; }
.card-value { font-size:26px; font-weight:700; margin-top:4px; color:#1a1a1a; }
.card:nth-child(1) { background:#fff7e6; }
.card:nth-child(2) { background:#e6fffb; }
.card:nth-child(3) { background:#f5f0ff; }
.card:nth-child(4) { background:#fff0f6; }
.card:nth-child(5) { background:#e6f7ff; }
.rank-title { font-size:16px; font-weight:700; margin:24px 0 12px; padding-left:12px; border-left:3px solid #a3e635; }
.chart-row { display:grid; grid-template-columns:1fr 1fr; gap:28px; }
@media (max-width:960px) { .chart-row { grid-template-columns:1fr; } }
.chart-box { position:relative; height:280px; }
.chart-box h3 { font-size:14px; font-weight:600; margin-bottom:8px; color:#666; }
.rank-list { display:flex; flex-direction:column; gap:4px; }
.ritem { display:grid; grid-template-columns:28px 36px 1fr auto auto; gap:8px; align-items:center; padding:10px 14px; border:1px solid #eee; border-radius:10px; }
.ritem:hover { background:#fafafa; }
.rn { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; background:#f0f0f0; flex-shrink:0; }
.rn.gold { background:#fbbf24; }
.rn.silver { background:#d1d5db; }
.rn.bronze { background:#d97706; color:#fff; }
.av { width:34px; height:34px; border-radius:50%; background:#a3e635; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; flex-shrink:0; }
.nm { font-weight:600; font-size:14px; white-space:nowrap; }
.col-play { font-weight:700; font-size:14px; text-align:right; white-space:nowrap; }
.col-stat { font-size:12px; color:#999; text-align:right; white-space:nowrap; }
</style>
</head>
<body>
<div class="container">
  <h1>A区 · 6.1 - 6.14 运营数据看板</h1>
  <p class="subtitle">数据周期：2026-06-01 至 2026-06-14 · 含数字人、无人商超、商超、测评图文</p>
  <div class="section">
    <div class="section-title">A区综合</div>
    <div class="card-grid">
      <div class="card"><div class="card-label">播放量（万）</div><div class="card-value">68.4</div></div>
      <div class="card"><div class="card-label">发布条数</div><div class="card-value">6,576</div></div>
      <div class="card"><div class="card-label">过5K条数</div><div class="card-value">55</div></div>
      <div class="card"><div class="card-label">上5K占比</div><div class="card-value">0.8%</div></div>
      <div class="card"><div class="card-label">美国占比（均）</div><div class="card-value">65.1%</div></div>
    </div>
  </div>
  <div id="app"></div>
</div>
<script>
var DATA = {"数字人": [{"运营名字": "庄惜婷", "播放量": 16.2, "发布条数": 500.0, "上5K条数": 6, "美国占比": 0.964, "上5K占比": 1.2}, {"运营名字": "王春燕", "播放量": 6.1, "发布条数": 920.0, "上5K条数": 3, "美国占比": 0.964, "上5K占比": 0.3}], "测评图文": [{"运营名字": "吴丽贞", "播放量": 34.8, "发布条数": 2091.0, "上5K条数": 31, "美国占比": 0.7634, "上5K占比": 1.5}, {"运营名字": "蔡晓雪", "播放量": 8.6, "发布条数": 1934.0, "上5K条数": 11, "美国占比": 0.4105, "上5K占比": 0.6}, {"运营名字": "庄惜婷", "播放量": 2.7, "发布条数": 1127.0, "上5K条数": 4, "美国占比": 0.1916, "上5K占比": 0.4}]};

function fmt(n) {
  if (typeof n !== 'number') return n;
  if (Number.isInteger(n)) return n.toLocaleString();
  return n.toFixed(1);
}
function fmtPct(v) { return v != null && !isNaN(v) ? v.toFixed(1) : '0.0'; }

function rankRow(item, i) {
  var medal = i === 0 ? ' gold' : i === 1 ? ' silver' : i === 2 ? ' bronze' : '';
  var us = item['美国占比'] ? (item['美国占比']*100).toFixed(1) : '0.0';
  var stats = '发布' + item['发布条数'] + ' · 过5K' + item['上5K条数'] + ' · ' + fmtPct(item['上5K占比']) + '% · 美占' + us + '%';
  return '<div class="ritem">' +
    '<div class="rn' + medal + '">' + (i+1) + '</div>' +
    '<div class="av">' + item['运营名字'].charAt(0) + '</div>' +
    '<div class="nm">' + item['运营名字'] + '</div>' +
    '<div class="col-play">' + item['播放量'] + '万</div>' +
    '<div class="col-stat">' + stats + '</div>' +
    '</div>';
}

var COLORS = ['#a3e635','#fbbf24','#f472b6','#60a5fa','#a78bfa','#34d399','#fb923c'];
function makeChart(id, items) {
  var canvas = document.getElementById(id);
  if (!canvas) return;
  var sorted = items.slice().sort(function(a,b){return b['播放量']-a['播放量']});
  new Chart(canvas, {
    type:'bar',
    data:{labels:sorted.map(function(x){return x['运营名字']}), datasets:[{data:sorted.map(function(x){return x['播放量']}), backgroundColor:COLORS.slice(0,sorted.length), borderColor:'#000', borderWidth:1, borderRadius:4}]},
    options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, grid:{color:'#e8e8e8'}, ticks:{callback:function(v){return v+'万'}}}, x:{grid:{display:false}}}}
  });
}

var app = document.getElementById('app');
[{'key':'数字人', 'label':'数字人（含无人商超、商超）'}, {'key':'测评图文', 'label':'测评图文'}].forEach(function(plate) {
  var items = DATA[plate.key];
  if (!items || items.length === 0) return;
  var sumPlay = items.reduce(function(s,x){return s+x['播放量']}, 0);
  var sumPub = items.reduce(function(s,x){return s+x['发布条数']}, 0);
  var sum5k = items.reduce(function(s,x){return s+x['上5K条数']}, 0);
  var avgUs = items.reduce(function(s,x){return s+(x['美国占比']||0)}, 0) / items.length;
  var html = '<div class="section"><div class="section-title">' + plate.label + '</div><div class="card-grid">';
  html += '<div class="card"><div class="card-label">播放量（万）</div><div class="card-value">' + fmt(sumPlay) + '</div></div>';
  html += '<div class="card"><div class="card-label">发布条数</div><div class="card-value">' + fmt(sumPub) + '</div></div>';
  html += '<div class="card"><div class="card-label">过5K条数</div><div class="card-value">' + fmt(sum5k) + '</div></div>';
  html += '<div class="card"><div class="card-label">上5K占比</div><div class="card-value">' + (sumPub?(sum5k/sumPub*100).toFixed(1):'0.0') + '%</div></div>';
  html += '<div class="card"><div class="card-label">美国占比（均）</div><div class="card-value">' + (avgUs*100).toFixed(1) + '%</div></div>';
  html += '</div><div class="rank-title">运营播放量排行</div><div class="chart-row"><div class="chart-box"><h3>播放量对比（万）</h3><canvas id="ch-' + plate.key + '"></canvas></div><div class="rank-list">' + items.map(function(item,i){return rankRow(item,i)}).join('') + '</div></div></div>';
  app.insertAdjacentHTML('beforeend', html);
  makeChart('ch-' + plate.key, items);
});
</script>
</body>
</html>
