<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6.1-6.14 A区运营看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Satoshi', -apple-system, 'Segoe UI', sans-serif; background:#f5f5f5; padding:24px; }
.container { max-width:1200px; margin:0 auto; }
h1 { font-size:28px; font-weight:700; margin-bottom:8px; }
.subtitle { color:#666; font-size:14px; margin-bottom:24px; }
.section { margin-bottom:40px; }
.section-title { font-size:22px; font-weight:700; margin-bottom:16px; padding:12px 16px; background:#000; color:#fff; border-radius:16px; }
.card-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:12px; margin-bottom:24px; }
.card { background:#fff; border:1px solid #000; border-radius:16px; padding:16px; box-shadow:2px 2px 0 0 #0a0a0d; }
.card-label { font-size:12px; color:#666; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px; }
.card-value { font-size:28px; font-weight:700; }
.card-value .unit { font-size:14px; font-weight:400; color:#666; }
.chart-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
.chart-box { background:#fff; border:1px solid #000; border-radius:16px; padding:16px; box-shadow:2px 2px 0 0 #0a0a0d; }
.chart-box h3 { font-size:14px; font-weight:700; margin-bottom:12px; }
.chart-wrap { height:250px; }
.rank-list { background:#fff; border:1px solid #000; border-radius:16px; padding:16px; box-shadow:2px 2px 0 0 #0a0a0d; }
.rank-list h3 { font-size:14px; font-weight:700; margin-bottom:12px; }
.ritem { display:grid; grid-template-columns:32px 32px 1fr 80px 80px; gap:8px; align-items:center; padding:10px 8px; border-bottom:1px solid #eee; }
.ritem:last-child { border-bottom:none; }
.rn { width:28px; height:28px; border-radius:50%; background:#eee; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; }
.rn.gold { background:#fbbf24; }
.rn.silver { background:#d1d5db; }
.rn.bronze { background:#f59e0b; }
.av { width:28px; height:28px; border-radius:50%; background:#a3e635; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; }
.nm { font-weight:600; font-size:13px; }
.vl { font-size:13px; font-weight:700; text-align:right; }
.vl2 { font-size:12px; color:#666; text-align:right; }
@media (max-width:768px) { .chart-row { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="container" id="app">
<h1>A 区运营月报</h1>
<p class="subtitle">统计周期：2026.06.01 — 2026.06.14</p>
</div>
<script>
var DATA = [{"label": "数字人板块", "total_play": 29.1, "total_pub": 1357, "total_over5k": 66, "total_opct": 4.86, "total_us": 96.1, "persons": [{"name": "庄惜婷", "play": 19.0, "pub": 437, "over5k": 28, "opct": 6.41, "us": 0}, {"name": "王春燕", "play": 10.1, "pub": 920, "over5k": 38, "opct": 4.13, "us": 96.1}], "writers": [{"name": "小娜", "play": 18.6, "pub": 405, "over5k": 26, "opct": 6.42}, {"name": "林秋利", "play": 10.3, "pub": 716, "over5k": 38, "opct": 5.31}, {"name": "何嘉玲", "play": 0.2, "pub": 236, "over5k": 2, "opct": 0.85}]}, {"label": "测评板块", "total_play": 47.1, "total_pub": 4662, "total_over5k": 47, "total_opct": 1.01, "total_us": 66.38, "persons": [{"name": "吴丽贞", "play": 34.8, "pub": 1807, "over5k": 31, "opct": 1.72, "us": 76.34}, {"name": "蔡晓雪", "play": 8.6, "pub": 1794, "over5k": 11, "opct": 0.61, "us": 35.51}, {"name": "庄惜婷", "play": 3.7, "pub": 1061, "over5k": 5, "opct": 0.47, "us": 0}], "writers": [{"name": "桂环", "play": 47.1, "pub": 4662, "over5k": 47, "opct": 1.01}]}];

function fmt(v) { return typeof v === 'number' ? v.toLocaleString() : v; }

function buildCards(c) {
  var colors = ['#fef3c8','#d2fae5','#fae9ff','#f5d1fe','#c8e6fe'];
  var items = [
    ['播放量', c.total_play + '万'],
    ['发布条数', fmt(c.total_pub)],
    ['上5K条数', fmt(c.total_over5k)],
    ['上5K占比', c.total_opct + '%'],
    ['美国占比(均)', c.total_us + '%']
  ];
  var h = '';
  for (var i = 0; i < items.length; i++) {
    h += '<div class="card" style="background:' + colors[i%colors.length] + '">' +
      '<div class="card-label">' + items[i][0] + '</div>' +
      '<div class="card-value">' + items[i][1] + '</div></div>';
  }
  return h;
}

function rankListHtml(items, fields) {
  var h = '';
  for (var i = 0; i < items.length; i++) {
    var medal = i === 0 ? ' gold' : i === 1 ? ' silver' : i === 2 ? ' bronze' : '';
    h += '<div class="ritem">' +
      '<div class="rn' + medal + '">' + (i+1) + '</div>' +
      '<div class="av">' + items[i].name.charAt(0) + '</div>' +
      '<div class="nm">' + items[i].name + '</div>';
    for (var f = 0; f < fields.length; f++) {
      var v = fields[f].fmt ? fields[f].fmt(items[i]) : items[i][fields[f].k];
      h += '<div class="' + (f===0?'vl':'vl2') + '">' + v + '</div>';
    }
    h += '</div>';
  }
  return h;
}

function render() {
  var app = document.getElementById('app');
  for (var s = 0; s < DATA.length; s++) {
    var sec = DATA[s];

    // 板块标题
    var secHtml = '<div class="section">' +
      '<div class="section-title">' + sec.label + '</div>' +
      '<div class="card-grid">' + buildCards(sec) + '</div>';

    // 运营排行 + 图表
    secHtml += '<div class="chart-row">' +
      '<div class="chart-box"><h3>运营 · 播放量对比</h3><div class="chart-wrap"><canvas id="chartBarP' + s + '"></canvas></div></div>' +
      '<div class="rank-list"><h3>运营 · 排行榜</h3>' +
      rankListHtml(sec.persons, [
        {k:'play', fmt:function(x){return x.play+'万'}},
        {k:'pub', fmt:function(x){return fmt(x.pub)+'条'}},
        {k:'opct', fmt:function(x){return x.opct+'%'}}
      ]) + '</div></div>';

    // 文案排行 + 图表
    secHtml += '<div class="chart-row">' +
      '<div class="chart-box"><h3>文案 · 播放量对比</h3><div class="chart-wrap"><canvas id="chartBarW' + s + '"></canvas></div></div>' +
      '<div class="rank-list"><h3>文案 · 排行榜</h3>' +
      rankListHtml(sec.writers, [
        {k:'play', fmt:function(x){return x.play+'万'}},
        {k:'pub', fmt:function(x){return fmt(x.pub)+'条'}},
        {k:'opct', fmt:function(x){return x.opct+'%'}}
      ]) + '</div></div></div>';

    app.insertAdjacentHTML('beforeend', secHtml);
  }

  // 初始化图表
  for (var s = 0; s < DATA.length; s++) {
    var sec = DATA[s];
    var sortedP = sec.persons.slice().sort(function(a,b){return b.play-a.play});
    new Chart(document.getElementById('chartBarP'+s), {
      type:'bar',
      data:{labels:sortedP.map(function(x){return x.name}), datasets:[{data:sortedP.map(function(x){return x.play}), label:'播放量(万)', backgroundColor:'#a3e635', borderColor:'#000', borderWidth:1}]},
      options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}}}
    });
    var sortedW = sec.writers.slice().sort(function(a,b){return b.play-a.play});
    new Chart(document.getElementById('chartBarW'+s), {
      type:'bar',
      data:{labels:sortedW.map(function(x){return x.name}), datasets:[{data:sortedW.map(function(x){return x.play}), label:'播放量(万)', backgroundColor:'#fbbf24', borderColor:'#000', borderWidth:1}]},
      options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}}}
    });
  }
}

render();
</script>
</body>
</html>
